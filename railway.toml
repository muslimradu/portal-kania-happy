# Railway MUST use repo root (Root Directory = empty).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/usr/local/bin/entrypoint.sh"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Production URL — dipakai storage URL, dll.
[env]
APP_URL = "https://kaniahappy.up.railway.app"
