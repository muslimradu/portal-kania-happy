[build]
builder = "NIXPACKS"
# Composer di-handle otomatis oleh Nixpacks (phase install). Jangan panggil composer di sini.
buildCommand = "npm ci --legacy-peer-deps && npm run build"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
preDeployCommand = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan storage:link"
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
